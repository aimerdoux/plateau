name: Release to PyPI

# Publishes the wheel + sdist to PyPI when a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC) — NO API token/secret is stored in the repo.
# One-time setup (maintainer): on PyPI, add a Trusted Publisher for project "plateau"
#   owner=aimerdoux, repo=plateau, workflow=release.yml, environment=pypi.

on:
  release:
    types: [published]

permissions:
  id-token: write   # required for trusted publishing
  contents: read

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
